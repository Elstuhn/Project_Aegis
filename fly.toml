app = 'project-aegis'
primary_region = 'sin'

[build]

[[services]]
  internal_port = 5173
  protocol = "tcp"

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    port = 8000
    handlers = ["tls"]

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1