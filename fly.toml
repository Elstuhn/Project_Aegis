app = 'project-aegis-y--m3g'
primary_region = 'sin'

[build]
  [build.args]
    VITE_WS_URL = "wss://project-aegis-y--m3g.fly.dev:8000"

[http_service]
  internal_port = 5173
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    port = 8000
    handlers = ["tls"]

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1